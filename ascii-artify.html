<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2rem;
            text-shadow: 0 0 10px #00ff00;
        }

        .upload-zone {
            border: 2px dashed #00ff00;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 2rem;
            background: rgba(0, 255, 0, 0.05);
        }

        .upload-zone:hover {
            background: rgba(0, 255, 0, 0.1);
        }

        .upload-zone.dragging {
            background: rgba(0, 255, 0, 0.2);
        }

        input[type="file"] {
            display: none;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
        }

        input[type="range"],
        select {
            background: #1a1a1a;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 0.5rem;
            font-family: 'Courier New', monospace;
        }

        button {
            background: #00ff00;
            color: #0a0a0a;
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            box-shadow: 0 0 20px #00ff00;
        }

        button:disabled {
            opacity: 0.5;
        }

        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .preview-box {
            border: 1px solid #00ff00;
            padding: 1rem;
            background: #0f0f0f;
        }

        #preview {
            max-width: 100%;
        }

        #asciiCanvas {
            max-width: 100%;
            image-rendering: pixelated;
        }

        .stats {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            .preview-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>▓█▓ ASCII ART CONVERTER ▓█▓</h1>

    <div class="upload-zone" id="uploadZone">
        <p style="font-size: 1.2rem;">▲ DROP IMAGE HERE ▲</p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Width: <span id="widthValue">100</span></label>
            <input type="range" id="width" min="20" max="200" value="100">
        </div>

        <div class="control-group">
            <label>Charset</label>
            <select id="charset">
                <option value="standard">Standard</option>
                <option value="simple">Simple</option>
                <option value="blocks">Blocks</option>
                <option value="binary">Binary</option>
            </select>
        </div>

        <div class="control-group">
            <label><input type="checkbox" id="invert"> Invert</label>
        </div>

        <div class="control-group">
            <button id="copyBtn" disabled>COPY ASCII</button>
        </div>
    </div>

    <div id="output" style="display:none;">
        <div class="preview-container">
            <div class="preview-box">
                <img id="preview">
            </div>
            <div class="preview-box">
                <canvas id="asciiCanvas"></canvas>
                <div class="stats" id="stats"></div>
            </div>
        </div>
    </div>
</div>

<script>
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const asciiCanvas = document.getElementById('asciiCanvas');
const output = document.getElementById('output');
const widthSlider = document.getElementById('width');
const widthValue = document.getElementById('widthValue');
const charsetSelect = document.getElementById('charset');
const invertCheckbox = document.getElementById('invert');
const copyBtn = document.getElementById('copyBtn');
const stats = document.getElementById('stats');

const charsets = {
    standard: " .'`^\",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$",
    simple: " .:-=+*#%@",
    blocks: " ░▒▓█",
    binary: " █"
};

let currentImage = null;
let asciiText = '';

uploadZone.onclick = () => fileInput.click();

fileInput.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = () => {
        const img = new Image();
        img.onload = () => {
            currentImage = img;
            preview.src = reader.result;
            output.style.display = 'block';
            generateAscii();
        };
        img.src = reader.result;
    };
    reader.readAsDataURL(file);
};

widthSlider.oninput = () => {
    widthValue.textContent = widthSlider.value;
    if (currentImage) generateAscii();
};

charsetSelect.onchange = () => currentImage && generateAscii();
invertCheckbox.onchange = () => currentImage && generateAscii();

copyBtn.onclick = () => {
    navigator.clipboard.writeText(asciiText);
};

function generateAscii() {
    const width = +widthSlider.value;
    const charset = charsets[charsetSelect.value];
    const invert = invertCheckbox.checked;

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    const h = Math.floor(width * (currentImage.height / currentImage.width) * 0.5);
    canvas.width = width;
    canvas.height = h;

    ctx.drawImage(currentImage, 0, 0, width, h);
    const pixels = ctx.getImageData(0, 0, width, h).data;

    let ascii = '';
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < width; x++) {
            const i = (y * width + x) * 4;
            const brightness = (0.299*pixels[i] + 0.587*pixels[i+1] + 0.114*pixels[i+2]) / 255;
            const val = invert ? 1 - brightness : brightness;
            ascii += charset[Math.floor(val * (charset.length - 1))];
        }
        ascii += '\n';
    }

    asciiText = ascii;
    copyBtn.disabled = false;
    stats.textContent = `${width}×${h}`;

    render(ascii, width, h);
}

function render(ascii, w, h) {
    const ctx = asciiCanvas.getContext('2d');
    const fs = 6;
    const cw = fs * 0.6;

    asciiCanvas.width = w * cw;
    asciiCanvas.height = h * fs;

    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, asciiCanvas.width, asciiCanvas.height);

    ctx.fillStyle = "#0f0";
    ctx.font = `${fs}px monospace`;

    ascii.split('\n').forEach((line, y) => {
        [...line].forEach((c, x) => {
            ctx.fillText(c, x * cw, y * fs);
        });
    });
}
</script>
</body>
</html>
