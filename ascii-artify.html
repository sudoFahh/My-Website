<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2rem;
            text-shadow: 0 0 10px #00ff00;
        }

        .upload-zone {
            border: 2px dashed #00ff00;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 2rem;
            background: rgba(0, 255, 0, 0.05);
        }

        .upload-zone:hover {
            background: rgba(0, 255, 0, 0.1);
            border-color: #00ff00;
        }

        .upload-zone.dragging {
            background: rgba(0, 255, 0, 0.2);
            border-color: #00ff00;
        }

        input[type="file"] {
            display: none;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            color: #00ff00;
        }

        input[type="range"],
        select {
            background: #1a1a1a;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 0.5rem;
            font-family: 'Courier New', monospace;
        }

        input[type="range"] {
            cursor: pointer;
        }

        button {
            background: #00ff00;
            color: #0a0a0a;
            border: none;
            padding: 0.75rem 1.5rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        button:hover {
            background: #00cc00;
            box-shadow: 0 0 20px #00ff00;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .output {
            margin-top: 2rem;
        }

        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .preview-box {
            border: 1px solid #00ff00;
            padding: 1rem;
            background: #0f0f0f;
        }

        .preview-box h3 {
            margin-bottom: 1rem;
            color: #00ff00;
        }

        #preview {
            max-width: 100%;
            height: auto;
            display: block;
        }

        #ascii-output {
            background: #000;
            border: 1px solid #00ff00;
            padding: 1rem;
            overflow-x: auto;
            white-space: pre;
            line-height: 1;
            font-size: 8px;
            letter-spacing: 0;
            color: #00ff00;
            margin-bottom: 1rem;
        }

        .stats {
            font-size: 0.8rem;
            color: #00ff00;
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            .preview-container {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>▓█▓ ASCII ART CONVERTER ▓█▓</h1>
        
        <div class="upload-zone" id="uploadZone">
            <p style="font-size: 1.2rem; margin-bottom: 1rem;">▲ DROP IMAGE HERE ▲</p>
            <p style="opacity: 0.7;">or click to browse</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="width">Width (characters): <span id="widthValue">100</span></label>
                <input type="range" id="width" min="20" max="200" value="100">
            </div>

            <div class="control-group">
                <label for="charset">Character Set:</label>
                <select id="charset">
                    <option value="standard">Standard</option>
                    <option value="simple">Simple</option>
                    <option value="blocks">Blocks</option>
                    <option value="binary">Binary</option>
                </select>
            </div>

            <div class="control-group">
                <label for="invert">
                    <input type="checkbox" id="invert"> Invert Colors
                </label>
            </div>

            <div class="control-group">
                <button id="copyBtn" disabled>COPY TO CLIPBOARD</button>
            </div>
        </div>

        <div class="output" id="output" style="display: none;">
            <div class="preview-container">
                <div class="preview-box">
                    <h3>▓ ORIGINAL IMAGE</h3>
                    <img id="preview" alt="Preview">
                </div>
                <div class="preview-box">
                    <h3>▓ ASCII OUTPUT</h3>
                    <canvas id="asciiCanvas" style="max-width: 100%; height: auto; image-rendering: pixelated;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const asciiOutput = document.getElementById('ascii-output');
        const asciiCanvas = document.getElementById('asciiCanvas');
        const output = document.getElementById('output');
        const widthSlider = document.getElementById('width');
        const widthValue = document.getElementById('widthValue');
        const charsetSelect = document.getElementById('charset');
        const invertCheckbox = document.getElementById('invert');
        const copyBtn = document.getElementById('copyBtn');
        const stats = document.getElementById('stats');

        const charsets = {
            standard: " .'`^\",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$",
            simple: " .:-=+*#%@",
            blocks: " ░▒▓█",
            binary: " █"
        };

        let currentImage = null;
        let asciiText = '';

        // Upload zone interactions
        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragging');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragging');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragging');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleImage(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleImage(file);
            }
        });

        // Control listeners
        widthSlider.addEventListener('input', (e) => {
            widthValue.textContent = e.target.value;
            if (currentImage) {
                generateAscii();
            }
        });

        charsetSelect.addEventListener('change', () => {
            if (currentImage) {
                generateAscii();
            }
        });

        invertCheckbox.addEventListener('change', () => {
            if (currentImage) {
                generateAscii();
            }
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(asciiText).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'COPIED!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
        });

        function handleImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    preview.src = e.target.result;
                    output.style.display = 'block';
                    generateAscii();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function generateAscii() {
            const width = parseInt(widthSlider.value);
            const charset = charsets[charsetSelect.value];
            const invert = invertCheckbox.checked;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Calculate dimensions
            const aspectRatio = currentImage.height / currentImage.width;
            const height = Math.floor(width * aspectRatio * 0.5); // 0.5 for character aspect ratio

            canvas.width = width;
            canvas.height = height;

            // Draw and get image data
            ctx.drawImage(currentImage, 0, 0, width, height);
            const imageData = ctx.getImageData(0, 0, width, height);
            const pixels = imageData.data;

            // Generate ASCII
            let ascii = '';
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    const r = pixels[idx];
                    const g = pixels[idx + 1];
                    const b = pixels[idx + 2];
                    
                    // Calculate brightness
                    const brightness = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                    const adjustedBrightness = invert ? 1 - brightness : brightness;
                    
                    // Map to character
                    const charIndex = Math.floor(adjustedBrightness * (charset.length - 1));
                    ascii += charset[charIndex];
                }
                ascii += '\n';
            }

            asciiText = ascii;
            asciiOutput.textContent = ascii;
            copyBtn.disabled = false;

            // Update stats
            const lines = ascii.split('\n').length - 1;
            const chars = ascii.length - lines; // Exclude newlines
            stats.textContent = `${width}×${height} characters | ${lines} lines | ${chars} total chars`;

            // Render to canvas for preview
            renderAsciiToCanvas(ascii, width, height);
        }

        function renderAsciiToCanvas(ascii, width, height) {
            const fontSize = 6;
            const charWidth = fontSize * 0.6;
            const charHeight = fontSize;

            asciiCanvas.width = width * charWidth;
            asciiCanvas.height = height * charHeight;

            const ctx = asciiCanvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, asciiCanvas.width, asciiCanvas.height);
            
            ctx.fillStyle = '#00ff00';
            ctx.font = `${fontSize}px Courier New`;
            ctx.textBaseline = 'top';

            const lines = ascii.split('\n');
            lines.forEach((line, y) => {
                for (let x = 0; x < line.length; x++) {
                    ctx.fillText(line[x], x * charWidth, y * charHeight);
                }
            });
        }
    </script>
</body>
</html>
