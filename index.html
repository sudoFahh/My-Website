		<script>
document.addEventListener('DOMContentLoaded', function() {
  const blurbData = {
    '/about': ['POKEMON!', 'webdev', 'cool stuff', 'idk'],
    '/blog': ['thoughts', 'rambles', 'ideas'],
    '/projects': ['MY PROJECTS LOLOL', 'things i made', 'portfolio'],
    '/webrings': ['internet rings', 'community'],
    'mailto:m4.sh@tuta.io': ['get in touch', 'send a note', 'wowow email!!!'],
    'https://github.com/compactdiscdrive': ['code go brrr', 'github'],
    'https://vncl.xyz': ['""""my company""""', 'vinculum?']
  };

  document.querySelectorAll('.links a').forEach(link => {
    const href = link.getAttribute('href');
    const blurbs = blurbData[href];
    
    if (blurbs) {
      link.addEventListener('mouseenter', function() {
        const randomBlurb = blurbs[Math.floor(Math.random() * blurbs.length)];
        
        let blurbEl = this.querySelector('.blurb');
        if (!blurbEl) {
          blurbEl = document.createElement('span');
          blurbEl.className = 'blurb';
          this.appendChild(blurbEl);
        }
        blurbEl.textContent = randomBlurb;
      });
    }
  });
});

];

const randomCat = catImages[Math.floor(Math.random() * catImages.length)];
document.getElementById("cat-img").src = randomCat;
</script>
